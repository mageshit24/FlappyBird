# dev/logging.properties
#
# Optional development-time logging configuration for java.util.logging.
# Not required to run or build the game - the JDK's built-in default
# (plain ConsoleHandler at INFO) works fine without this. This just
# gives cleaner, single-line output while developing, instead of the
# default two-line-per-record format.
#
# Usage:
#   java -Djava.util.logging.config.file=dev/logging.properties -jar FlappyBird.jar
#
# or set it as a VM option in your IDE run configuration (see the
# bundled "App (Game)" and "Feature Tests" IntelliJ run configurations,
# which already do this).

handlers=java.util.logging.ConsoleHandler
.level=INFO

java.util.logging.ConsoleHandler.level=ALL
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter

# One line per record: [time] LEVEL ClassName method: message
java.util.logging.SimpleFormatter.format=[%1$tF %1$tT] %4$-7s %2$s: %5$s%6$s%n
